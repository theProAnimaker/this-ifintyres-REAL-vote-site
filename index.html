<link rel="icon" href="infinityers_favoricon.ico" type="image/x-icon"><!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infinityers Show</title>

<style>
body{
margin:0;
font-family:Allan;
background:url("backgrouh.png") center/cover fixed;
text-align:center;
color:white;
}

#dark{<div id="counter">TOTAL VOTES: <span id="votes">0</span></div>

<script>
let totalVotes = localStorage.getItem("totalVotes");

if(totalVotes === null){
    totalVotes = 0;
}

document.getElementById("votes").textContent = totalVotes;

function vote(){<img src="voteButton.png"
onclick="vote()"
style="width:200px;cursor:pointer;">

    totalVotes++;

    localStorage.setItem("totalVotes", totalVotes);

    document.getElementById("votes").textContent = totalVotes;
}
</script>
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0);
pointer-events:none;
transition:0.3s;
z-index:1;
}

#title{
width:80%;
max-width:600px;
margin-top:10px;
position:relative;
z-index:2;
}

#counter{
margin-top:10px;
font-size:18px;
position:relative;
z-index:2;
}

#grid{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
margin-top:20px;
position:relative;
z-index:2;
}

.card{
background:rgba(0,0,0,0.7);
border:2px solid white;
border-radius:15px;
padding:10px;
width:160px;
}

.card img{
width:100%;
display:block;
}

button{
width:100%;
padding:10px;
margin-top:8px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

#final{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:10;
background:rgba(0,0,0,0);
text-align:center;
}

#final img{
width:90%;
max-width:600px;
margin-top:50px;
}
</style>
</head>

<body>

<div id="dark"></div>

<img id="title" src="llamativetitle.png">

<div id="counter">
Votos: <span id="votes">0</span>
</div>

<div id="grid">

<div class="card">
<img src="glassJuice.png">
<button onclick="vote()">VOTAR</button>
</div>

<div class="card">
<img src="IMON.png">
<button onclick="vote()">VOTAR</button>
</div>

<div class="card">
<img src="chocoLateCake.png">
<button onclick="vote()">VOTAR</button>
</div>

<div class="card">
<img src="aPPle.png">
<button onclick="vote()">VOTAR</button>
</div>

</div>

<div id="final">
<img src="finalMesiga.png">
</div>

<script>
let total = 0;

function vote(){
total++;

document.getElementById("votes").innerText = total;

document.getElementById("dark").style.background = "rgba(0,0,0,0.6)";
document.getElementById("grid").style.display = "none";
document.getElementById("counter").style.display = "none";
document.getElementById("title").style.display = "none";

document.getElementById("final").style.display = "block";
}
</script>

</body>
</html>
